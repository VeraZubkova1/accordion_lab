<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Куда поехать / Лабораторная работа 3-4</title>
</head>
<body>
    <div class="container">
        <div class="accordion">
            <h1 class="title">Куда поехать в разные времена года</h1>
            
           
            <input class="radio" type="radio" id="winter" name="seasons" checked>
            <label for="winter">
                <div class="item">
                    <div class="header">
                        <span class="name">Зима</span>
                        <span class="icon"></span>
                    </div>
                    <div class="content">
                        <h3 class="country"> Таиланд</h3>
                        <img src="images/63f911fd00ce245ceb5be7f0.jpg" alt="Таиланд">
                        <p class="description">Классический Новый год с мандаринами и оливье под ёлкой может показаться кому-то скучным. Для разнообразия на зимние каникулы интересно отправиться в тёплые страны. 
                        В Таиланде почти везде сухая и солнечная погода — это пик туристического сезона в стране. Средняя температура днём — от +26 до +32 °С. Неслучайно Таиланд входит в тройку самых популярных направлений для празднования Нового года у российских туристов. 
                        </p>
                    </div>
                </div>
            </label>

           
            <input class="radio" type="radio" id="spring" name="seasons">
            <label for="spring">
                <div class="item">
                    <div class="header">
                        <span class="name">Весна </span>
                        <span class="icon"></span>
                    </div>
                    <div class="content">
                         <h3 class="country">Париж</h3>
                         <img src="images/istockphoto-1433721359-612x612.jpg" alt="Таиланд">
                        <p class="description">Весной в Париже климат может быть переменчивым: холодный и дождливый, тёплый и солнечный. Некоторые особенности погоды в разные месяцы:</p>
    
    <p class="description"><strong>Март</strong> — днём воздух чаще всего прогревается до +10…+14 °C, в солнечные дни возможны скачки до +17 °C, особенно ближе к концу месяца. Ночью температура обычно держится в пределах +3…+7 °C. Из-за ветра ощущается холоднее, чем показывают цифры.</p>
    <p class="description"><strong>Апрель</strong> — настоящая весенняя погода: +15°C днём, +7°C ночью. Количество осадков возрастает до 55 мм, но дожди тёплые и быстро проходят.</p>   
    <p class="description"><strong>Май</strong> — +18°C днём, +11°C ночью. Осадков выпадает около 65 мм — это пик дождливого сезона, но ливни кратковременные и освежающие.</p>
                    </div>
                </div>
            </label>

           
            <input class="radio" type="radio" id="summer" name="seasons">
            <label for="summer">
                <div class="item">
                    <div class="header">
                        <span class="name">Лето </span>
                        <span class="icon"></span>
                    </div>
                    <div class="content">
                        <h3 class="country"> Греция</h3>
                         <img src="images/15657.jpg" alt="Греция">
                        <p class="description">Июнь +28–30°C. Санторини, белые домики, синие купола, закаты ради которых люди едут на край света. Очень фотогенично, вкусная еда, море и античность.</p>
                    </div>
                </div>
            </label>

           
            <input class="radio" type="radio" id="autumn" name="seasons">
            <label for="autumn">
                <div class="item">
                    <div class="header">
                        <span class="name">Осень </span>
                        <span class="icon"></span>
                    </div>
                    <div class="content">
                        <h3 class="country"> Италия </h3>
                        <img src="images/pngtree-venice-italy-grand-canal-is-a-concentration-of-the-most-beautiful-image-16785198.jpg" alt="Таиланд">
                        <p class="description">Октябрь-ноябрь +20°C — идеально для экскурсий. Рим, Флоренция, Венеция без толп туристов. Паста, пицца, джелато и настоящее итальянское гостеприимство.</p>
                    </div>
                </div>
            </label>
        </div> 
    </div> 
</body>
</html>
